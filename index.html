<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Badge Reader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        .nfc-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-text {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        .message-text {
            font-size: 24px;
            color: #666;
            margin-bottom: 40px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .authorized-btn {
            background: #4CAF50;
            color: white;
        }
        .authorized-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        .unauthorized-btn {
            background: #F44336;
            color: white;
        }
        .unauthorized-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }
        .reset-btn {
            background: #2196F3;
            color: white;
            width: 100%;
        }
        .reset-btn:hover {
            background: #0b7dda;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
        }
        .info-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-top: 30px;
        }
        .badge-verified { color: #4CAF50; }
        .badge-unverified { color: #F44336; }
        .welcome { color: #4CAF50; }
        .denied { color: #F44336; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nfc-icon">📱</div>
        
        <div class="status-text" id="statusText">Tap your card here</div>
        <div class="message-text" id="messageText"></div>

        <div class="button-group">
            <button class="authorized-btn" onclick="simulateAuthorized()">✓ Authorized Card</button>
            <button class="unauthorized-btn" onclick="simulateUnauthorized()">✗ Unauthorized Card</button>
        </div>

        <button class="reset-btn" onclick="resetHomeScreen()">Reset</button>

        <div class="info-box">
            <strong>Web Mock Version</strong><br>
            Click the buttons above to simulate NFC card detection.
        </div>
    </div>

    <script>
        let resetTimer = null;

        function simulateAuthorized() {
            const statusText = document.getElementById('statusText');
            const messageText = document.getElementById('messageText');

            statusText.innerHTML = '<span class="badge-verified">Badge Verified</span>';
            messageText.innerHTML = '<span class="welcome">Welcome!</span>';
            document.body.style.background = 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)';

            if (navigator.vibrate) {
                navigator.vibrate(100);
            }

            clearTimeout(resetTimer);
            resetTimer = setTimeout(resetHomeScreen, 3000);
        }

        function simulateUnauthorized() {
            const statusText = document.getElementById('statusText');
            const messageText = document.getElementById('messageText');

            statusText.innerHTML = '<span class="badge-unverified">Badge Unverified</span>';
            messageText.innerHTML = '<span class="denied">Access Denied</span>';
            document.body.style.background = 'linear-gradient(135deg, #F44336 0%, #da190b 100%)';

            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 100]);
            }

            clearTimeout(resetTimer);
            resetTimer = setTimeout(resetHomeScreen, 3000);
        }

        function resetHomeScreen() {
            const statusText = document.getElementById('statusText');
            const messageText = document.getElementById('messageText');

            statusText.textContent = 'Tap your card here';
            messageText.textContent = '';
            document.body.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === '1') simulateAuthorized();
            if (e.key === '2') simulateUnauthorized();
            if (e.key === '0') resetHomeScreen();
        });
    </script>
</body>
</html>
