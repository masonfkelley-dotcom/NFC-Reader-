<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mason Kelley's Office</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #070707;
            --muted: #757575;
            --gold: #d6ad42;
            --gold-soft: #f4d98d;
            --green: #35c759;
            --red: #ff3b30;
            --panel: rgba(255, 255, 255, 0.86);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background:
                radial-gradient(circle at 50% 14%, rgba(214, 173, 66, 0.24), transparent 34%),
                linear-gradient(145deg, #181818 0%, #050505 52%, #101010 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 22px;
            color: var(--black);
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: linear-gradient(to bottom, black, transparent 76%);
            pointer-events: none;
        }

        .app-shell {
            width: min(430px, 100%);
            position: relative;
            z-index: 1;
        }

        .device {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 34px;
            padding: 22px;
            box-shadow:
                0 30px 80px rgba(0,0,0,0.48),
                inset 0 1px 0 rgba(255,255,255,0.75);
            backdrop-filter: blur(24px);
            transition: transform 0.4s ease;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 22px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .logo {
            width: 54px;
            height: 54px;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 24px rgba(0,0,0,0.28);
            border: 1px solid rgba(214,173,66,0.38);
            flex: 0 0 auto;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .title {
            font-size: 19px;
            line-height: 1.1;
            font-weight: 750;
        }

        .subtitle {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 0.4px;
        }

        .lock-button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: #111111;
            color: white;
            flex: 0 0 auto;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
        }

        .lock-button svg {
            width: 22px;
            height: 22px;
            stroke-width: 2.5;
        }

        .wallet-stage {
            min-height: 430px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.88), rgba(248,248,248,0.78)),
                radial-gradient(circle at center, rgba(214,173,66,0.18), transparent 54%);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 28px;
            padding: 24px;
            display: grid;
            grid-template-rows: auto 1fr auto auto;
            overflow: hidden;
            position: relative;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            position: relative;
            z-index: 2;
        }

        .status-text {
            font-size: 13px;
            color: var(--muted);
            font-weight: 650;
        }

        .message-text {
            margin-top: 4px;
            font-size: 25px;
            line-height: 1.05;
            font-weight: 800;
        }

        .result-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: #efefef;
            color: var(--black);
            transition: background 0.24s ease, color 0.24s ease, transform 0.24s ease;
            flex: 0 0 auto;
        }

        .result-icon svg {
            width: 25px;
            height: 25px;
            stroke-width: 3;
        }

        .badge-area {
            position: relative;
            display: grid;
            place-items: center;
            perspective: 900px;
        }

        .halo {
            position: absolute;
            width: 224px;
            height: 224px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(214,173,66,0.25), transparent 66%);
            transform: scale(0.82);
            opacity: 0.82;
            transition: transform 0.5s cubic-bezier(.2,.8,.2,1), opacity 0.35s ease;
        }

        .badge-card {
            width: min(304px, 94%);
            aspect-ratio: 1.62;
            border: none;
            border-radius: 24px;
            padding: 22px;
            color: white;
            background:
                linear-gradient(135deg, rgba(255,255,255,0.24), transparent 38%),
                linear-gradient(145deg, #151515 0%, #222222 55%, #050505 100%);
            box-shadow:
                0 26px 50px rgba(0,0,0,0.28),
                inset 0 1px 0 rgba(255,255,255,0.22);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transform: translateY(0) rotateX(0) rotateY(0) scale(1);
            transition:
                transform 0.56s cubic-bezier(.2,.8,.2,1),
                box-shadow 0.56s ease,
                background 0.28s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .badge-card:hover {
            transform: translateY(-6px) rotateX(5deg) rotateY(-4deg) scale(1.015);
            box-shadow:
                0 34px 64px rgba(0,0,0,0.32),
                inset 0 1px 0 rgba(255,255,255,0.25);
        }

        .badge-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .badge-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 26%, rgba(255,255,255,0.30) 45%, transparent 64%);
            transform: translateX(-140%);
            opacity: 0;
        }

        .badge-card::after {
            content: "";
            position: absolute;
            inset: auto 18px 18px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .card-logo {
            position: absolute;
            right: 14px;
            bottom: 10px;
            width: 130px;
            height: 72px;
            object-fit: cover;
            border-radius: 12px;
            opacity: 0.18;
            filter: saturate(1.1) contrast(1.15);
            z-index: 1;
        }

        .badge-chip {
            width: 42px;
            height: 32px;
            border-radius: 9px;
            background:
                linear-gradient(90deg, transparent 32%, rgba(0,0,0,0.14) 32%, rgba(0,0,0,0.14) 36%, transparent 36%),
                linear-gradient(#f5d77b, #bd8f26);
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.18);
            position: relative;
            z-index: 2;
        }

        .badge-name {
            position: absolute;
            left: 22px;
            bottom: 30px;
            z-index: 3;
            text-align: left;
        }

        .badge-name strong {
            display: block;
            font-size: 18px;
            letter-spacing: 0.2px;
        }

        .badge-name span {
            display: block;
            margin-top: 5px;
            font-size: 11px;
            color: rgba(255,255,255,0.64);
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .tap-rings {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 38px;
            height: 38px;
            opacity: 0.82;
            z-index: 3;
        }

        .tap-rings span {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255,255,255,0.58);
            border-left-color: transparent;
            border-bottom-color: transparent;
            border-radius: 50%;
            transform: rotate(45deg) scale(var(--s));
        }

        .tap-rings span:nth-child(1) { --s: 0.45; }
        .tap-rings span:nth-child(2) { --s: 0.72; }
        .tap-rings span:nth-child(3) { --s: 1; }

        .scan-line {
            position: absolute;
            left: 20px;
            right: 20px;
            top: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.96), transparent);
            box-shadow: 0 0 24px rgba(255,255,255,0.9);
            opacity: 0;
            transform: translateY(-76px);
            z-index: 4;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .face-button {
            min-height: 54px;
            border: none;
            border-radius: 17px;
            background: #111111;
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.18);
            transition: transform 0.2s ease, background 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .face-button:active {
            transform: scale(0.98);
        }

        .face-button svg {
            width: 20px;
            height: 20px;
            stroke-width: 2.6;
        }

        .tap-hint,
        .last-access {
            text-align: center;
            font-size: 13px;
            font-weight: 650;
        }

        .tap-hint {
            color: rgba(0,0,0,0.44);
            margin-top: 2px;
        }

        .last-access {
            color: rgba(0,0,0,0.52);
            min-height: 18px;
            margin-top: 8px;
            transition: opacity 0.35s ease;
        }

        .fine-print {
            margin-top: 16px;
            color: rgba(255,255,255,0.54);
            text-align: center;
            font-size: 12px;
            letter-spacing: 0.2px;
        }

        .face-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.48);
            display: grid;
            place-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.24s ease;
            z-index: 5;
            padding: 24px;
        }

        .face-modal.is-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .face-panel {
            width: min(310px, 100%);
            border-radius: 30px;
            background: rgba(245,245,245,0.92);
            border: 1px solid rgba(255,255,255,0.55);
            box-shadow: 0 30px 80px rgba(0,0,0,0.42);
            backdrop-filter: blur(26px);
            padding: 28px 24px 24px;
            text-align: center;
            transform: translateY(18px) scale(0.96);
            transition: transform 0.28s cubic-bezier(.2,.8,.2,1);
        }

        .face-modal.is-visible .face-panel {
            transform: translateY(0) scale(1);
        }

        .face-scanner {
            width: 118px;
            height: 118px;
            margin: 0 auto 18px;
            border-radius: 32px;
            border: 3px solid rgba(0,0,0,0.75);
            position: relative;
            display: grid;
            place-items: center;
            overflow: hidden;
            background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(230,230,230,0.58));
        }

        .face-scanner::before {
            content: "";
            position: absolute;
            left: 12px;
            right: 12px;
            height: 2px;
            background: var(--gold);
            box-shadow: 0 0 22px rgba(214,173,66,0.95);
            animation: faceScan 1.25s ease-in-out infinite;
        }

        .face-scanner svg {
            width: 72px;
            height: 72px;
            stroke-width: 1.8;
            opacity: 0.78;
        }

        .face-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .face-copy {
            font-size: 13px;
            color: var(--muted);
            font-weight: 650;
        }

        .is-processing .halo {
            transform: scale(1.22);
            opacity: 1;
        }

        .is-processing .badge-card {
            transform: translateY(-18px) rotateX(12deg) scale(1.04);
            box-shadow:
                0 38px 75px rgba(0,0,0,0.34),
                inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .is-processing .badge-card::before {
            animation: cardShine 0.95s ease forwards;
            opacity: 1;
        }

        .is-processing .scan-line {
            animation: scan 0.95s cubic-bezier(.4,0,.2,1) forwards;
            opacity: 1;
        }

        .is-approved .result-icon,
        .face-modal.is-approved .face-scanner {
            background: var(--green);
            color: white;
        }

        .is-denied .result-icon,
        .face-modal.is-denied .face-scanner {
            background: var(--red);
            color: white;
        }

        .is-approved .result-icon,
        .is-denied .result-icon {
            transform: scale(1.08);
        }

        .is-approved .badge-card {
            background:
                linear-gradient(135deg, rgba(255,255,255,0.22), transparent 38%),
                linear-gradient(145deg, #102a18 0%, #168235 58%, #062d13 100%);
        }

        .is-denied .badge-card {
            background:
                linear-gradient(135deg, rgba(255,255,255,0.18), transparent 38%),
                linear-gradient(145deg, #3c1110 0%, #b12621 58%, #2b0504 100%);
            animation: deniedShake 0.44s ease 0.66s;
        }

        .is-fading {
            animation: softReset 0.42s ease;
        }

        @keyframes cardShine {
            to { transform: translateX(140%); }
        }

        @keyframes scan {
            0% { transform: translateY(-76px); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(76px); opacity: 0; }
        }

        @keyframes faceScan {
            0%, 100% { transform: translateY(-46px); opacity: 0.35; }
            50% { transform: translateY(46px); opacity: 1; }
        }

        @keyframes deniedShake {
            0%, 100% { transform: translateY(-18px) rotateX(12deg) translateX(0) scale(1.04); }
            25% { transform: translateY(-18px) rotateX(12deg) translateX(-8px) scale(1.04); }
            50% { transform: translateY(-18px) rotateX(12deg) translateX(8px) scale(1.04); }
            75% { transform: translateY(-18px) rotateX(12deg) translateX(-5px) scale(1.04); }
        }

        @keyframes softReset {
            0% { opacity: 1; transform: scale(1); }
            45% { opacity: 0.78; transform: scale(0.985); }
            100% { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 430px) {
            body {
                padding: 14px;
            }

            .device {
                border-radius: 28px;
                padding: 16px;
            }

            .wallet-stage {
                min-height: 420px;
                padding: 20px;
            }

            .message-text {
                font-size: 22px;
            }

            .title {
                font-size: 17px;
            }
        }
    </style>
</head>

<body>
    <main class="app-shell">
        <section class="device" id="accessPanel" aria-live="polite">
            <div class="top-bar">
                <div class="brand">
                    <div class="logo">
                        <img src="mason-office-logo.png" alt="Mason's Office logo">
                    </div>

                    <div>
                        <div class="title">Mason Kelley's Office</div>
                        <div class="subtitle">Private access</div>
                    </div>
                </div>

                <div class="lock-button" aria-hidden="true">
                    <svg id="lockSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                        <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
                    </svg>
                </div>
            </div>

            <div class="wallet-stage">
                <div class="status-row">
                    <div>
                        <div class="status-text" id="statusText">Ready to verify</div>
                        <div class="message-text" id="messageText">Tap badge</div>
                    </div>

                    <div class="result-icon" aria-hidden="true">
                        <svg id="resultSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 3v18"></path>
                            <path d="M7 8h10"></path>
                            <path d="M7 16h10"></path>
                        </svg>
                    </div>
                </div>

                <div class="badge-area">
                    <div class="halo"></div>

                    <button class="badge-card" id="badgeCard" onclick="randomVerify('badge')" aria-label="Tap badge to verify access">
                        <img class="card-logo" src="mason-office-logo.png" alt="">
                        <div class="badge-chip"></div>

                        <div class="tap-rings" aria-hidden="true">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>

                        <div class="badge-name">
                            <strong>Mason Kelley</strong>
                            <span>Office badge</span>
                        </div>

                        <div class="scan-line"></div>
                    </button>
                </div>

                <div class="actions">
                    <button class="face-button" onclick="startFaceId()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M8 3H6a3 3 0 0 0-3 3v2"></path>
                            <path d="M16 3h2a3 3 0 0 1 3 3v2"></path>
                            <path d="M8 21H6a3 3 0 0 1-3-3v-2"></path>
                            <path d="M16 21h2a3 3 0 0 0 3-3v-2"></path>
                            <path d="M9 10h.01"></path>
                            <path d="M15 10h.01"></path>
                            <path d="M9 15c1.2 1 4.8 1 6 0"></path>
                        </svg>
                        Face ID
                    </button>
                    <div class="tap-hint">Tap the badge or use Face ID</div>
                    <div class="last-access" id="lastAccess">No recent attempts</div>
                </div>
            </div>
        </section>

        <p class="fine-print">Secure office access</p>
    </main>

    <div class="face-modal" id="faceModal" aria-hidden="true">
        <div class="face-panel">
            <div class="face-scanner">
                <svg id="faceSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M8 3H6a3 3 0 0 0-3 3v2"></path>
                    <path d="M16 3h2a3 3 0 0 1 3 3v2"></path>
                    <path d="M8 21H6a3 3 0 0 1-3-3v-2"></path>
                    <path d="M16 21h2a3 3 0 0 0 3-3v-2"></path>
                    <path d="M9 10h.01"></path>
                    <path d="M15 10h.01"></path>
                    <path d="M9 15c1.2 1 4.8 1 6 0"></path>
                </svg>
            </div>
            <div class="face-title" id="faceTitle">Scanning Face</div>
            <div class="face-copy" id="faceCopy">Hold still for verification</div>
        </div>
    </div>

    <script>
        const panel = document.getElementById('accessPanel');
        const statusText = document.getElementById('statusText');
        const messageText = document.getElementById('messageText');
        const resultSvg = document.getElementById('resultSvg');
        const lockSvg = document.getElementById('lockSvg');
        const lastAccess = document.getElementById('lastAccess');
        const faceModal = document.getElementById('faceModal');
        const faceTitle = document.getElementById('faceTitle');
        const faceCopy = document.getElementById('faceCopy');
        const faceSvg = document.getElementById('faceSvg');

        let timer;
        let isBusy = false;
        let audioContext;

        const icons = {
            idle: `
                <path d="M12 3v18"></path>
                <path d="M7 8h10"></path>
                <path d="M7 16h10"></path>
            `,
            approved: '<path d="M20 6 9 17l-5-5"></path>',
            denied: `
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
            `,
            locked: `
                <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
            `,
            unlocked: `
                <rect x="5" y="10" width="14" height="10" rx="2"></rect>
                <path d="M8 10V7a4 4 0 0 1 7.4-2.1"></path>
            `,
            face: `
                <path d="M8 3H6a3 3 0 0 0-3 3v2"></path>
                <path d="M16 3h2a3 3 0 0 1 3 3v2"></path>
                <path d="M8 21H6a3 3 0 0 1-3-3v-2"></path>
                <path d="M16 21h2a3 3 0 0 0 3-3v-2"></path>
                <path d="M9 10h.01"></path>
                <path d="M15 10h.01"></path>
                <path d="M9 15c1.2 1 4.8 1 6 0"></path>
            `
        };

        function randomVerify(method) {
            if (isBusy) return;
            verifyAccess(Math.random() >= 0.5, method);
        }

        function startFaceId() {
            if (isBusy) return;

            isBusy = true;
            clearTimeout(timer);
            faceModal.classList.remove('is-approved', 'is-denied');
            faceModal.classList.add('is-visible');
            faceModal.setAttribute('aria-hidden', 'false');
            faceTitle.textContent = 'Scanning Face';
            faceCopy.textContent = 'Hold still for verification';
            faceSvg.innerHTML = icons.face;
            playTone('scan');

            setTimeout(() => {
                const isApproved = Math.random() >= 0.5;
                faceModal.classList.add(isApproved ? 'is-approved' : 'is-denied');
                faceTitle.textContent = isApproved ? 'Face Verified' : 'Face Not Verified';
                faceCopy.textContent = isApproved ? 'Access granted' : 'Access denied';
                faceSvg.innerHTML = isApproved ? icons.approved : icons.denied;
                verifyAccess(isApproved, 'Face ID', true);
            }, 1450);
        }

        function verifyAccess(isApproved, method, fromFaceId = false) {
            isBusy = true;
            clearTimeout(timer);

            panel.classList.remove('is-approved', 'is-denied', 'is-fading');
            panel.classList.add('is-processing');

            statusText.textContent = fromFaceId ? 'Checking Face ID' : 'Verifying badge';
            messageText.textContent = fromFaceId ? 'Scanning face' : 'Hold near reader';
            resultSvg.innerHTML = icons.idle;

            if (navigator.vibrate) {
                navigator.vibrate(70);
            }

            setTimeout(() => {
                panel.classList.remove('is-processing');
                panel.classList.add(isApproved ? 'is-approved' : 'is-denied');

                statusText.textContent = isApproved ? 'Access granted' : 'Access denied';
                messageText.textContent = isApproved ? 'Welcome in' : 'Not verified';
                resultSvg.innerHTML = isApproved ? icons.approved : icons.denied;
                lockSvg.innerHTML = isApproved ? icons.unlocked : icons.locked;
                lastAccess.textContent = `Last attempt: ${isApproved ? 'Approved' : 'Denied'} by ${method} at ${getTime()}`;

                playTone(isApproved ? 'approved' : 'denied');

                if (navigator.vibrate) {
                    navigator.vibrate(isApproved ? 180 : [90, 50, 90, 50, 90]);
                }

                timer = setTimeout(reset, fromFaceId ? 3600 : 3300);
            }, fromFaceId ? 300 : 950);
        }

        function reset() {
            panel.classList.add('is-fading');
            faceModal.classList.remove('is-visible', 'is-approved', 'is-denied');
            faceModal.setAttribute('aria-hidden', 'true');

            setTimeout(() => {
                panel.classList.remove('is-processing', 'is-approved', 'is-denied');
                statusText.textContent = 'Ready to verify';
                messageText.textContent = 'Tap badge';
                resultSvg.innerHTML = icons.idle;
                lockSvg.innerHTML = icons.locked;
                isBusy = false;
            }, 220);
        }

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        }

        function playTone(type) {
            try {
                audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
                const now = audioContext.currentTime;

                if (type === 'approved') {
                    tone(660, now, 0.11, 0.045);
                    tone(880, now + 0.11, 0.13, 0.05);
                } else if (type === 'denied') {
                    tone(220, now, 0.12, 0.05);
                    tone(160, now + 0.11, 0.16, 0.045);
                } else {
                    tone(440, now, 0.08, 0.025);
                    tone(520, now + 0.1, 0.08, 0.025);
                }
            } catch (error) {
                return;
            }
        }

        function tone(frequency, start, duration, volume) {
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;
            gain.gain.setValueAtTime(0.001, start);
            gain.gain.exponentialRampToValueAtTime(volume, start + 0.015);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);

            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            oscillator.start(start);
            oscillator.stop(start + duration + 0.02);
        }
    </script>
</body>
